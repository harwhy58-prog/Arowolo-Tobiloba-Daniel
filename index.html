    <script>
      // Global fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.writable && descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              value: window.fetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Polyfill protection failed:', e);
        }
      })();
    </script>

    <div id="root"></div>
